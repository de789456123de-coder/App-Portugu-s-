name: Build APK Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Gerar projeto Android nativo
        run: npx expo prebuild --platform android --no-install

      - name: Empacotar JS dentro do APK
        run: echo "bundleInDebug=true" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: LinguaMaster-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Criar Release no GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: LinguaMaster ${{ github.ref_name }}
          body: |
            ## LinguaMaster ${{ github.ref_name }}

            App completo de Língua Portuguesa para Concursos Públicos.

            **Conteúdo:**
            - 7 módulos com 43 aulas aprofundadas
            - 105 flashcards com flip animado
            - Exercícios por módulo + Simulado Final com 20 questões
            - Progresso salvo automaticamente

            **Como instalar no Android:**
            1. Baixe o arquivo `app-debug.apk`
            2. No Android: Configurações → Segurança → ativar "Fontes desconhecidas"
            3. Abra o APK e confirme a instalação
